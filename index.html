<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>ERC IT CLOUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --card: #1e293b; 
            --text: #f1f5f9; --text-muted: #94a3b8; --border: #334155; 
            --accent: #6366f1; --high: #ff4d4d; --med: #ffae00; --low: #10b981; 
            --success-green: #059669;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; line-height: 1.5; }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .login-box { background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }

        input, textarea, select { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); margin-bottom: 10px; font-size: 15px; outline: none; font-family: 'Inter', sans-serif; }
        textarea { resize: none; }

        button { border: 1px solid var(--border); padding: 10px 14px; border-radius: 10px; font-weight: 700; cursor: pointer; background: var(--panel); color: var(--text); font-size: 12px; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--accent); color: white; border: none; height: 48px; width: 100%; font-size: 15px; display: flex; align-items: center; justify-content: center; }
        .btn-success { background: var(--success-green) !important; color: white !important; border: none !important; }

        #userView, #adminView { display: none; max-width: 1200px; margin: 0 auto; }
        #userView { max-width: 500px; text-align: center; padding-top: 20px; }

        .user-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .u-btn { padding: 15px; border-radius: 12px; background: var(--panel); border: 2px solid var(--border); color: var(--text-muted); font-weight: 800; cursor: pointer; font-size: 12px; }
        .u-btn.active { border-color: var(--accent); color: white; background: rgba(99, 102, 241, 0.1); }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 1px solid var(--border); padding: 12px; z-index: 1000; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .mobile-nav { display: grid; } #col-requests { display: none; } body { padding-bottom: 80px; } }

        #statusDisplay { font-size: 10px; font-weight: 900; letter-spacing: 0.5px; }
        .status-dot { font-size: 12px; margin-right: -1px; }
        .online { color: #10b981; text-shadow: 0 0 5px rgba(16,185,129,0.3); }
        .syncing { color: #f59e0b; text-shadow: 0 0 5px rgba(245,158,11,0.3); }
        .offline { color: #ef4444; text-shadow: 0 0 5px rgba(239,68,68,0.3); }

        .form-section { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 16px; margin-bottom: 25px; }
        .item { background: var(--panel); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 15px; border-left: 6px solid #334155; text-align: left; }
        .item.completed { opacity: 0.5; filter: grayscale(0.4); border-left-color: #475569 !important; }

        .meta-line { font-size: 11px; font-weight: 700; color: var(--accent); display: block; margin-bottom: 4px; }
        .time-line { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .comments-area { background: rgba(15, 23, 42, 0.6); border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid var(--border); }
        .comment-item { font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }

        .group-header { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin: 25px 0 12px; display: flex; align-items: center; gap: 10px; }
        .group-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .countdown-badge { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; background: rgba(99,102,241,0.15); color: var(--accent); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h1>ERC PORTAL</h1>
        <input type="password" id="passInput" placeholder="Enter Key" style="text-align:center;">
        <button class="btn-primary" onclick="attemptLogin()">Sign In</button>
    </div>
</div>

<div id="userView">
    <h2 style="color:var(--accent)">Portal Submission</h2>
    <div class="user-toggle">
        <div id="u-tab-t" class="u-btn active" onclick="setMode('t')">🎫<br>IT Ticket</div>
        <div id="u-tab-r" class="u-btn" onclick="setMode('r')">📅<br>Schedule Task</div>
    </div>
    <div class="item" style="border-left:none;">
        <div style="display:flex; gap:10px;"><input id="u_name" placeholder="Your Name"><input id="u_loc" placeholder="Location"></div>
        <input id="u_title" placeholder="Title">
        <textarea id="u_desc" placeholder="Details..." rows="3"></textarea>
        <div id="u_extra" style="display:none; flex-direction:column; gap:10px; margin-bottom:10px;">
            <label style="font-size:10px; color:var(--accent); text-align:left; font-weight:800;">CHOOSE DATE & TIME:</label>
            <div style="display:flex; gap:10px;"><input type="date" id="u_date"><input type="time" id="u_time"></div>
        </div>
        <button class="btn-primary" id="submitBtn" onclick="submitUserForm()">Submit Ticket</button>
    </div>
    <button onclick="location.reload()" style="opacity:0.5; border:none; margin-top:20px;">LOGOUT</button>
</div>

<div id="adminView">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>ADMIN CONSOLE <span id="statusDisplay" class="online"><span class="status-dot">●</span>Online</span></h2>
        <div style="display:flex; gap:10px;"><button onclick="sync()">🔄</button><button onclick="location.reload()" style="color:var(--high)">🔒</button></div>
    </div>
    <div class="container">
        <div id="col-tickets">
            <h3 style="color:var(--accent)">Active Tickets</h3>
            <div class="form-section">
                <div style="display:flex; gap:10px;"><input id="at_name" placeholder="Requester"><input id="at_loc" placeholder="Location"></div>
                <input id="at_title" placeholder="Title">
                <textarea id="at_desc" placeholder="Notes..." rows="2"></textarea>
                <div style="display:flex; gap:10px;"><select id="at_pri" style="flex:1"><option>Low</option><option selected>Medium</option><option>High</option></select>
                <button class="btn-primary" style="flex:1" onclick="addItem('t')">Add Ticket</button></div>
            </div>
            <div id="ticketList"></div>
            <div class="group-header">✅ Completed Tickets</div>
            <div id="compTicketList"></div>
        </div>
        <div id="col-requests">
            <h3 style="color:var(--accent)">Active Tasks</h3>
            <div class="form-section">
                <div style="display:flex; gap:10px;"><input id="as_name" placeholder="Name"><input id="as_loc" placeholder="Location"></div>
                <input id="as_title" placeholder="Title">
                <div style="display:flex; gap:10px;"><input type="date" id="as_date"><input type="time" id="as_time"></div>
                <button class="btn-primary" style="margin-top:10px;" onclick="addItem('r')">Add Task</button>
            </div>
            <div id="scheduleList"></div>
            <div class="group-header">✅ Completed Tasks</div>
            <div id="compScheduleList"></div>
        </div>
    </div>
    <div class="mobile-nav">
        <button id="btn-t" onclick="switchTab('t')" style="background:var(--accent); color:white;">TICKETS</button>
        <button id="btn-r" onclick="switchTab('r')">SCHEDULE</button>
    </div>
</div>

<input type="color" id="colorPicker" style="display:none">

<script>
    const API = "https://script.google.com/macros/s/AKfycbyY5ZDOpdvFkyhUwE6iqAQHNidEOA-5TMq-P-IEiwRW7fRDPzBxS1DZ4g61ugRRUVchsQ/exec";
    let db = { tickets: [], requests: [], comp_t: [], comp_r: [] };
    let currentMode = 't';

    function setStatus(type) {
        const s = document.getElementById('statusDisplay');
        if(type === 'online') { s.innerHTML = '<span class="status-dot">●</span>Online'; s.className = 'online'; }
        else if(type === 'syncing') { s.innerHTML = '<span class="status-dot">●</span>Syncing'; s.className = 'syncing'; }
        else { s.innerHTML = '<span class="status-dot">●</span>Offline'; s.className = 'offline'; }
    }

    function attemptLogin() {
        const val = document.getElementById('passInput').value;
        if(btoa(val) === "RVJDMjAyNg==") { document.getElementById('loginOverlay').style.display='none'; document.getElementById('adminView').style.display='block'; sync(); }
        else if(btoa(val) === "VVNFUjIwMjY=") { document.getElementById('loginOverlay').style.display='none'; document.getElementById('userView').style.display='block'; }
        else alert("Invalid Key");
    }

    function setMode(m) { 
        currentMode = m; 
        document.getElementById('u-tab-t').className = 'u-btn ' + (m==='t'?'active':'');
        document.getElementById('u-tab-r').className = 'u-btn ' + (m==='r'?'active':'');
        document.getElementById('u_extra').style.display = m==='r'?'flex':'none';
        document.getElementById('submitBtn').innerText = m==='t'?'Submit Ticket':'Submit Request';
    }

    async function sync() {
        setStatus('syncing');
        try {
            const r = await fetch(API + '?t=' + Date.now());
            const data = await r.json();
            db = { tickets: data.tickets||[], requests: data.requests||[], comp_t: data.comp_t||[], comp_r: data.comp_r||[] };
            draw(); setStatus('online');
        } catch(e) { setStatus('offline'); }
    }

    async function save() {
        setStatus('syncing');
        try {
            await fetch(API, { method:"POST", mode:"no-cors", body: JSON.stringify(db) });
            setTimeout(sync, 1500);
        } catch(e) { setStatus('offline'); }
    }

    async function submitUserForm() {
        const n = document.getElementById('u_name').value, t = document.getElementById('u_title').value;
        const btn = document.getElementById('submitBtn');
        if(!n || !t) return alert("Missing Info");
        btn.innerText = "Sending..."; btn.disabled = true;
        try {
            const entry = { id: Date.now(), requester: n, location: document.getElementById('u_loc').value||"Office", title: t, description: document.getElementById('u_desc').value, priority: "Medium", comments: [], created: new Date().toLocaleString('en-GB') };
            if(currentMode==='r') { entry.date = document.getElementById('u_date').value; entry.time = document.getElementById('u_time').value||"09:00"; }
            const r = await fetch(API + '?t=' + Date.now()); const d = await r.json();
            db = { tickets: d.tickets||[], requests: d.requests||[], comp_t: d.comp_t||[], comp_r: d.comp_r||[] };
            if(currentMode==='t') db.tickets.unshift(entry); else db.requests.push(entry);
            await fetch(API, { method:"POST", mode:"no-cors", body: JSON.stringify(db) });
            btn.innerText = "Success!"; btn.classList.add('btn-success');
            setTimeout(() => location.reload(), 1500);
        } catch(e) { btn.innerText = "Error"; btn.disabled = false; }
    }

    function addItem(type) {
        const prefix = type === 't' ? 'at_' : 'as_';
        const t = document.getElementById(prefix+'title').value; if(!t) return;
        const entry = { id: Date.now(), requester: document.getElementById(prefix+'name').value||"ADMIN", location: document.getElementById(prefix+'loc').value||"HQ", title: t, description: document.getElementById(type==='t'?'at_desc':'')?.value||"", priority: document.getElementById('at_pri')?.value||"Medium", comments: [], created: new Date().toLocaleString('en-GB') };
        if(type==='r') { entry.date = document.getElementById('as_date').value; entry.time = document.getElementById('as_time').value||"09:00"; }
        if(type==='t') db.tickets.unshift(entry); else db.requests.push(entry);
        document.getElementById(prefix+'title').value = ''; draw(); save();
    }

    function move(from, to, id) {
        const item = db[from].find(x => x.id == id);
        if(item) { db[from] = db[from].filter(x => x.id != id); db[to].unshift(item); draw(); save(); }
    }

    function doDel(type, id) { if(confirm("Delete?")) { db[type] = db[type].filter(x=>x.id!=id); draw(); save(); } }

    function drawItem(item, type) {
        const isComp = type.startsWith('comp');
        const isTask = type === 'requests' || type === 'comp_r';
        return `
        <div class="item ${isComp?'completed':''}" style="border-left-color:${item.color||'#334155'}">
            <span class="meta-line">👤 ${item.requester} | 📍 ${item.location}</span>
            <span class="time-line">${isTask ? item.date + ' @ ' + item.time : 'Created: '+item.created}</span>
            <b style="font-size:14px; display:block;">${item.title}</b>
            <p style="font-size:12px; opacity:0.8;">${item.description||''}</p>
            <div style="display:flex; gap:8px; margin-top:10px;">
                ${isComp ? `<button onclick="move('${type}', '${type==='comp_t'?'tickets':'requests'}', ${item.id})">🔄</button>` : 
                           `<button onclick="move('${type}', '${type==='tickets'?'comp_t':'comp_r'}', ${item.id})">✅</button>`}
                <button onclick="const m=prompt('Comment:'); if(m){item.comments.push({text:m, date:new Date().toLocaleTimeString()}); draw(); save();}">💬</button>
                <button onclick="const cp=document.getElementById('colorPicker'); cp.oninput=(e)=>{item.color=e.target.value; draw(); save();}; cp.click();">🎨</button>
                <button onclick="doDel('${type}', ${item.id})" style="color:var(--high); margin-left:auto; border:none; background:none;">Del</button>
            </div>
            ${item.comments.length ? `<div class="comments-area">${item.comments.map(c=>`<div class="comment-item"><b>${c.date}</b>: ${c.text}</div>`).join('')}</div>` : ''}
        </div>`;
    }

    function draw() {
        document.getElementById('ticketList').innerHTML = db.tickets.map(t=>drawItem(t, 'tickets')).join('');
        document.getElementById('compTicketList').innerHTML = db.comp_t.map(t=>drawItem(t, 'comp_t')).join('');
        document.getElementById('scheduleList').innerHTML = db.requests.map(r=>drawItem(r, 'requests')).join('');
        document.getElementById('compScheduleList').innerHTML = db.comp_r.map(r=>drawItem(r, 'comp_r')).join('');
    }

    function switchTab(t) {
        document.getElementById('col-tickets').style.display = t === 't' ? 'block' : 'none';
        document.getElementById('col-requests').style.display = t === 'r' ? 'block' : 'none';
        document.getElementById('btn-t').style.background = t === 't' ? 'var(--accent)' : 'transparent';
        document.getElementById('btn-r').style.background = t === 'r' ? 'var(--accent)' : 'transparent';
    }
</script>
</body>
</html>
